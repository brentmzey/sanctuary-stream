name: Build and Release - All Platforms

on:
  push:
    branches:
      - main
      - development
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - development
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.0.0)"
        required: true
        default: "v0.1.0"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: Lint, Typecheck & Unit Tests
  validate:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm install
          cd sanctuary-app && npm install

      - name: Patch wry for Linux build
        run: |
          cd sanctuary-app/src-tauri
          cargo fetch
          WRY_PATH=$(cargo metadata --format-version 1 | jq -r '.packages[] | select(.name == "wry" and .version == "0.24.11") | .manifest_path' | sed 's/Cargo.toml//')
          if [ -n "$WRY_PATH" ] && [ -d "$WRY_PATH" ]; then
            PATCH_FILE=$(realpath ../../patches/wry-webkit-settings-ext.patch)
            patch -p1 -d "$WRY_PATH" < "$PATCH_FILE"
          fi

      - name: Run Validation Script
        run: ./scripts/validate.sh
        env:
          CI: true

  # Job 2: Playwright E2E Tests
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev \
            pkg-config

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Build macOS Desktop App
  build-macos:
    needs: [validate, e2e]
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Build macOS app (Universal)
        run: |
          cd sanctuary-app
          npm install @tauri-apps/cli
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            export APPLE_CERTIFICATE="${{ secrets.APPLE_CERTIFICATE }}"
            export APPLE_CERTIFICATE_PASSWORD="${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            export APPLE_SIGNING_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"
            export APPLE_ID="${{ secrets.APPLE_ID }}"
            export APPLE_PASSWORD="${{ secrets.APPLE_PASSWORD }}"
            export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          fi
          npx tauri build --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            sanctuary-app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            sanctuary-app/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app

  # Build Windows Desktop App
  build-windows:
    needs: [validate, e2e]
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Setup
        shell: bash
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Build Windows app
        shell: bash
        run: |
          cd sanctuary-app
          npm install @tauri-apps/cli
          if [ -n "${{ secrets.WINDOWS_CERTIFICATE }}" ]; then
            export WINDOWS_CERTIFICATE="${{ secrets.WINDOWS_CERTIFICATE }}"
            export WINDOWS_CERTIFICATE_PASSWORD="${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          fi
          npx tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            sanctuary-app/src-tauri/target/release/bundle/msi/*.msi
            sanctuary-app/src-tauri/target/release/bundle/nsis/*.exe

  # Build Linux Desktop App
  build-linux:
    needs: [validate, e2e]
    runs-on: ubuntu-22.04
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Patch wry for Linux build
        run: |
          cd sanctuary-app/src-tauri
          cargo fetch
          WRY_PATH=$(cargo metadata --format-version 1 | jq -r '.packages[] | select(.name == "wry" and .version == "0.24.11") | .manifest_path' | sed 's/Cargo.toml//')
          if [ -n "$WRY_PATH" ] && [ -d "$WRY_PATH" ]; then
            PATCH_FILE=$(realpath ../../patches/wry-webkit-settings-ext.patch)
            patch -p1 -d "$WRY_PATH" < "$PATCH_FILE"
          fi

      - name: Build Linux app
        run: |
          cd sanctuary-app
          npm install @tauri-apps/cli
          npx tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            sanctuary-app/src-tauri/target/release/bundle/deb/*.deb
            sanctuary-app/src-tauri/target/release/bundle/appimage/*.AppImage

  # Build Web App
  build-web:
    needs: [validate, e2e]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Build web app
        run: cd sanctuary-app && npm run build
        env:
          VITE_PB_URL: ${{ secrets.VITE_PB_URL }}

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: sanctuary-app/dist/

  # Build iOS App
  build-ios:
    needs: [validate, e2e]
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Build iOS app (Capacitor)
        run: |
          cd sanctuary-app
          npm run build
          npx cap sync ios
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            npx cap build ios --scheme App --target generic/platform=iOS --team ${{ secrets.APPLE_TEAM_ID }}
          else
            cd ios/App
            xcodebuild -project App.xcodeproj -scheme App -destination generic/platform=iOS -archivePath App.xcarchive archive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
            cd ../..
          fi

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: |
            sanctuary-app/ios/App/build/**/*.ipa
            sanctuary-app/ios/App/build/**/*.app

  # Build Android App
  build-android:
    needs: [validate, e2e]
    runs-on: ubuntu-22.04
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Build Android app (Capacitor)
        run: |
          cd sanctuary-app
          npm run build
          npx cap sync android
          if [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
             npx cap build android --androidreleasetype apk
          else
             cd android
             ./gradlew assembleDebug
             cd ..
          fi

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: |
            sanctuary-app/android/app/build/outputs/**/*.apk
            sanctuary-app/android/app/build/outputs/**/*.aab

  # Package Backend Configuration
  package-backend:
    needs: [validate, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Backend Configuration
        run: |
          mkdir -p backend-deploy/pocketbase
          cp -r pocketbase/local/pb_migrations backend-deploy/pocketbase/ 2>/dev/null || mkdir -p backend-deploy/pocketbase/pb_migrations
          cp docs/PRODUCTION_SETUP.md backend-deploy/README.md
          cd backend-deploy && zip -r ../backend-config.zip . && cd ..
          
      - name: Upload Backend Package
        uses: actions/upload-artifact@v4
        with:
          name: backend-config
          path: backend-config.zip

  # Build Rust CLI for all platforms
  build-cli:
    needs: [validate]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            rustup target add x86_64-apple-darwin aarch64-apple-darwin
            cargo build --release --package sanctuary-cli --target x86_64-apple-darwin
            cargo build --release --package sanctuary-cli --target aarch64-apple-darwin
            mkdir -p target/release
            lipo -create -output target/release/sanctuary-cli target/x86_64-apple-darwin/release/sanctuary-cli target/aarch64-apple-darwin/release/sanctuary-cli
          else
            cargo build --release --package sanctuary-cli
          fi
        shell: bash

      - name: Rename and Move Binary
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp target/release/sanctuary-cli.exe dist/sanctuary-win-x64.exe
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            cp target/release/sanctuary-cli dist/sanctuary-macos-universal
          else
            cp target/release/sanctuary-cli dist/sanctuary-linux-x64
          fi
        shell: bash

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary-cli-${{ matrix.os }}
          path: dist/*

  # Create GitHub Release
  create-release:
    needs: [build-macos, build-windows, build-linux, build-web, build-ios, build-android, build-cli, package-backend]
    runs-on: ubuntu-22.04
    if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate version number
        id: version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_name=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_name=Development Build $VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Public Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          make_latest: ${{ steps.version.outputs.is_prerelease == 'false' }}
          generate_release_notes: true
          body: |
            ## ⛪ Sanctuary Stream ${{ steps.version.outputs.version }}
            
            ${{ steps.version.outputs.is_prerelease == 'true' && '> ⚠️ **Development Build**: This is an automated build for testing.' || '> 🚀 **Stable Release**: This is a production-ready version of Sanctuary Stream.' }}

            ### 🚀 Installation & Setup
            📚 Complete guide: [BUILD_TEST_RUN.md](https://github.com/brentmzey/sanctuary-stream/blob/main/BUILD_TEST_RUN.md)

            ### 📦 Download Assets
            - 🍎 **macOS**: .dmg (Universal)
            - 🪟 **Windows**: .msi or sanctuary-win-x64.exe
            - 🐧 **Linux**: .deb, .AppImage, or sanctuary-linux-x64
            - 🤖 **Android**: .apk
            - 📱 **iOS**: .ipa (Internal use)
            - 🔌 **Native CLI**: Unified management tool for all platforms
            - 🗄️ **Backend**: PocketBase configuration package
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.ipa
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/sanctuary-macos-universal
            artifacts/**/sanctuary-linux-x64
            artifacts/backend-config/backend-config.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
