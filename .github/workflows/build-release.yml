name: Build and Release - All Platforms

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.0.0)"
        required: true
        default: "v0.1.0"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build macOS Desktop App
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Build macOS app (Universal)
        run: |
          cd sanctuary-app
          npm install @tauri-apps/cli
          # Only set signing env vars if they are available
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            export APPLE_CERTIFICATE="${{ secrets.APPLE_CERTIFICATE }}"
            export APPLE_CERTIFICATE_PASSWORD="${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            export APPLE_SIGNING_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"
            export APPLE_ID="${{ secrets.APPLE_ID }}"
            export APPLE_PASSWORD="${{ secrets.APPLE_PASSWORD }}"
            export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          fi
          npx tauri build --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            sanctuary-app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            sanctuary-app/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app

  # Build Windows Desktop App
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Setup
        shell: bash
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Build Windows app
        run: |
          cd sanctuary-app
          npm install @tauri-apps/cli
          # Only set signing env vars if they are available
          if [ -n "${{ secrets.WINDOWS_CERTIFICATE }}" ]; then
            export WINDOWS_CERTIFICATE="${{ secrets.WINDOWS_CERTIFICATE }}"
            export WINDOWS_CERTIFICATE_PASSWORD="${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          fi
          npx tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            sanctuary-app/src-tauri/target/release/bundle/msi/*.msi
            sanctuary-app/src-tauri/target/release/bundle/nsis/*.exe

  # Build Linux Desktop App
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Patch wry for Linux build
        run: |
          # Fetch the wry crate to ensure it's in the cargo registry
          cd sanctuary-app/src-tauri
          cargo fetch
          # Find the wry-0.24.11 source more robustly
          WRY_PATH=$(cargo metadata --format-version 1 | jq -r '.packages[] | select(.name == "wry" and .version == "0.24.11") | .manifest_path' | sed 's/Cargo.toml//')
          if [ -n "$WRY_PATH" ] && [ -d "$WRY_PATH" ]; then
            echo "Patching wry at $WRY_PATH"
            # Apply the patch using absolute path
            PATCH_FILE=$(realpath ../../patches/wry-webkit-settings-ext.patch)
            patch -p1 -d "$WRY_PATH" < "$PATCH_FILE"
          else
            echo "wry-0.24.11 not found in registry via metadata, trying find fallback..."
            WRY_PATH=$(find ~/.cargo/registry/src -name "wry-0.24.11" -type d | head -n 1)
            if [ -n "$WRY_PATH" ]; then
              PATCH_FILE=$(realpath ../../patches/wry-webkit-settings-ext.patch)
              patch -p1 -d "$WRY_PATH" < "$PATCH_FILE"
            fi
          fi

      - name: Build Linux app
        run: |
          cd sanctuary-app
          npm install @tauri-apps/cli
          npx tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            sanctuary-app/src-tauri/target/release/bundle/deb/*.deb
            sanctuary-app/src-tauri/target/release/bundle/appimage/*.AppImage

  # Build Web App
  build-web:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Build web app
        run: cd sanctuary-app && npm run build
        env:
          VITE_PB_URL: ${{ secrets.VITE_PB_URL }}

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: sanctuary-app/dist/

  # Build iOS App
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build iOS app (Capacitor)
        run: |
          cd sanctuary-app
          npm run build
          npx cap sync ios
          
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            npx cap build ios --scheme App --target generic/platform=iOS --team ${{ secrets.APPLE_TEAM_ID }}
          else
            # Unsigned build for CI verification
            cd ios/App
            xcodebuild -workspace App.xcworkspace -scheme App -destination generic/platform=iOS -archivePath App.xcarchive archive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
            cd ../..
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: |
            sanctuary-app/ios/App/build/**/*.ipa
            sanctuary-app/ios/App/build/**/*.app
            sanctuary-app/ios/App/*.xcarchive

  # Build Android App
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Build Android app (Capacitor)
        run: |
          cd sanctuary-app
          npm run build
          npx cap sync android
          
          if [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
             # We use the cap build command only if we have signing info
             npx cap build android --androidreleasetype apk
          else
             # Direct gradle call for unsigned debug build
             cd android
             ./gradlew assembleDebug
             cd ..
          fi
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: |
            sanctuary-app/android/app/build/outputs/**/*.apk
            sanctuary-app/android/app/build/outputs/**/*.aab

  # Package Backend Configuration
  package-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package PocketBase configuration
        run: |
          mkdir -p backend-deploy/pocketbase
          cp -r pocketbase/local/pb_migrations backend-deploy/pocketbase/ 2>/dev/null || mkdir -p backend-deploy/pocketbase/pb_migrations
          cp -r pocketbase/pb_hooks backend-deploy/pocketbase/ 2>/dev/null || mkdir -p backend-deploy/pocketbase/pb_hooks
          cp docs/PRODUCTION_SETUP.md backend-deploy/README.md
          
      - name: Upload Backend Package
        uses: actions/upload-artifact@v4
        with:
          name: backend-config
          path: backend-deploy/

  # Create GitHub Release
  create-release:
    needs: [build-macos, build-windows, build-linux, build-web, build-ios, build-android, package-backend]
    runs-on: ubuntu-22.04
    if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate version number
        id: version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_name=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_name=Development Build $VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Public Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            ## Sanctuary Stream ${{ steps.version.outputs.version }}
            **Secure-by-Design church streaming control system**

            ### 🚀 Installation & Setup
            📚 Complete guide: [BUILD_TEST_RUN.md](https://github.com/sanctuary-stream/sanctuary-stream/blob/main/BUILD_TEST_RUN.md)

            ### 📦 Download Assets
            Choose your platform below:
            - 🍎 **macOS**: .dmg (Universal)
            - 🪟 **Windows**: .msi
            - 🐧 **Linux**: .deb or .AppImage
            - 🤖 **Android**: .apk
            - 📱 **iOS**: .ipa (Internal use)
            - 🗄️ **Backend**: PocketBase configuration package
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.ipa
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/backend-config/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
