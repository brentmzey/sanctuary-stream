name: CI - Validation & Test Suite

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  validate:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          cd sanctuary-app && npm install
          cd ../sanctuary-bridge && npm install

      - name: Run Validation Script
        run: ./validate.sh
        env:
          CI: true

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev \
            pkg-config

      - name: Setup PocketBase
        run: |
          mkdir -p pocketbase/local
          wget https://github.com/pocketbase/pocketbase/releases/download/v0.25.0/pocketbase_0.25.0_linux_amd64.zip
          unzip pocketbase_0.25.0_linux_amd64.zip -d pocketbase/local
          chmod +x pocketbase/local/pocketbase

      - name: Run Setup
        run: ./scripts/setup.sh
        env:
          CI: true

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
