name: CI Test Suite

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

jobs:
  test:
    name: Run Unit Tests & Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Typecheck Shared Types
        run: bun run typecheck

      - name: Run Tests (Bridge)
        run: cd sanctuary-bridge && bun run test:coverage

      - name: Run Tests (App)
        run: cd sanctuary-app && bun run test:coverage
        
      # Optional: Add Codecov or similar action here to upload coverage reports
